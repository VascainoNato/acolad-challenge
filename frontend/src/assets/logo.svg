<svg xmlns="http://www.w3.org/2000/svg" width="336" height="94" viewBox="182 102 336 94" role="img">
  <title>ID Wallet logo</title>
  <desc>Logotipo do ID Wallet com ícone de carteira digital e estrelas da UE</desc>

  <defs>
    <linearGradient id="cardgrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e3a8a"/>
      <stop offset="100%" stop-color="#1a56c4"/>
    </linearGradient>
    <linearGradient id="shieldgrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a56c4"/>
      <stop offset="100%" stop-color="#0e3a8a"/>
    </linearGradient>
  </defs>

  <!-- Cartão de fundo (offset) -->
  <rect x="196" y="118" width="108" height="74" rx="10" fill="#0e3a8a" opacity="0.35"/>

  <!-- Cartão principal -->
  <rect x="188" y="108" width="108" height="74" rx="10" fill="url(#cardgrad)"/>

  <!-- Chip do cartão -->
  <rect x="200" y="121" width="18" height="14" rx="3" fill="#e8f0fd" opacity="0.9"/>
  <line x1="200" y1="128" x2="218" y2="128" stroke="#1a56c4" stroke-width="0.8" opacity="0.5"/>
  <line x1="209" y1="121" x2="209" y2="135" stroke="#1a56c4" stroke-width="0.8" opacity="0.5"/>

  <!-- Linha de nome simulada -->
  <rect x="200" y="145" width="44" height="4" rx="2" fill="#ffffff" opacity="0.5"/>
  <rect x="200" y="153" width="28" height="3" rx="1.5" fill="#ffffff" opacity="0.3"/>

  <!-- Estrelas EU -->
  <circle cx="272" cy="116" r="1.4" fill="#e8f0fd"/>
  <circle cx="280" cy="119" r="1.4" fill="#e8f0fd"/>
  <circle cx="283" cy="128" r="1.4" fill="#e8f0fd"/>
  <circle cx="278" cy="136" r="1.4" fill="#e8f0fd"/>
  <circle cx="269" cy="138" r="1.4" fill="#e8f0fd"/>
  <circle cx="263" cy="132" r="1.4" fill="#e8f0fd"/>
  <circle cx="263" cy="123" r="1.4" fill="#e8f0fd"/>
  <circle cx="269" cy="117" r="1.4" fill="#e8f0fd"/>

  <!-- Escudo de verificação -->
  <g transform="translate(272, 158)">
    <path d="M0 -14 L10 -10 L10 0 Q10 10 0 14 Q-10 10 -10 0 L-10 -10 Z"
          fill="#0f6e56" stroke="#e1f5ee" stroke-width="1"/>
    <polyline points="-4,1 -1,4 5,-3" fill="none" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- "ID" -->
  <text x="316" y="152"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="48" font-weight="700"
        fill="#0e3a8a" letter-spacing="-1">ID</text>

  <!-- "Wallet" -->
  <text x="364" y="152"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="48" font-weight="300"
        fill="#1a56c4" letter-spacing="-0.5">Wallet</text>

  <!-- Tagline -->
  <text x="316" y="173"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="12" font-weight="400"
        fill="#5f5e5a" letter-spacing="0.08em">eIDAS 2.0 · Digital Identity</text>

  <!-- Linha separadora -->
  <line x1="358" y1="118" x2="358" y2="158" stroke="#1a56c4" stroke-width="1" opacity="0.25"/>
</svg>
