<svg xmlns="http://www.w3.org/2000/svg" width="210" height="94" viewBox="308 102 210 94" role="img">
  <title>ID Wallet logo</title>
  <desc>Logotipo do ID Wallet (somente texto)</desc>

  <!-- "ID" -->
  <text x="316" y="152"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="48" font-weight="700"
        fill="#0e3a8a" letter-spacing="-1">ID</text>

  <!-- "Wallet" -->
  <text x="364" y="152"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="48" font-weight="300"
        fill="#1a56c4" letter-spacing="-0.5">Wallet</text>

  <!-- Tagline -->
  <text x="316" y="173"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="12" font-weight="400"
        fill="#5f5e5a" letter-spacing="0.08em">eIDAS 2.0 · Digital Identity</text>

  <!-- Linha separadora -->
  <line x1="358" y1="118" x2="358" y2="158" stroke="#1a56c4" stroke-width="1" opacity="0.25"/>
